<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SURE Tutorial - Slide 5</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&amp;family=Open+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<style>
    .input-field {
        background-color: #0f172a;
        border: 1px solid #1e293b;
        color: #ffffff;
        font-family: 'Open Sans', sans-serif;
        font-size: 24px;
        padding: 20px;
        border-radius: 12px;
        width: 100%;
        box-sizing: border-box;
        outline: none;
    }
    .action-btn {
        background-color: #10b981;
        color: #000000;
        font-family: 'Montserrat', sans-serif;
        font-size: 24px;
        font-weight: 800;
        padding: 24px;
        border: none;
        border-radius: 12px;
        width: 100%;
        cursor: pointer;
        text-transform: uppercase;
        transition: transform 0.2s ease, background-color 0.2s ease;
        margin-top: 24px;
    }
    .action-btn:hover {
        background-color: #059669;
        transform: translateY(-2px);
    }
</style>
</head>
<body style="margin: 0; padding: 0; overflow: hidden; background-color: #000000;" onclick="event.stopPropagation(); window.location.href='6.html'">
<div class="slide-container" style="position: relative; width: 1280px; height: 720px; overflow: hidden; background-color: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center;">

    <div style="width: 800px; background-color: #1e293b; padding: 60px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.05);">
        
        <p style="margin: 0 0 20px 0; font-family: 'Open Sans', sans-serif; font-size: 20px; color: #cbd5e1; text-align: center;">
            <span style="color: #f59e0b;">💡</span> Tu dominio es lo que va después del @ en tu correo corporativo:<br/>
            <span style="color: #94a3b8; font-size: 18px;">juan.perez <strong style="color: #10b981;">@mi-empresa.com</strong></span>
        </p>

        <!-- Hardcoded Domain for Presentation -->
        <input type="text" class="input-field" value="ceo@empresa.com" readonly style="color: #10b981; font-weight: bold; text-align: center;" />
        
        <button class="action-btn" onclick="event.stopPropagation(); window.location.href='6.html'">
            INICIATE PRELIMINAR ASSESSMENT OF MY DOMAIN
        </button>
    </div>

</div>
<script>
    document.addEventListener('keydown', function(event) {
        if (event.key === 'ArrowRight') { window.location.href='6.html'; }
        if (event.key === 'ArrowLeft') { window.location.href='4.html'; }
    });
</script>
</body>
</html>
