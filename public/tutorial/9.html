<!DOCTYPE html>

<style>
    .btn { padding: 15px 50px; background-color: #10b981; color: #000; border: none; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 30px; text-transform: uppercase;}

<body style="margin: 0; padding: 0; overflow: hidden; background-color: #000000;" onclick="event.stopPropagation(); window.location.href='10.html'">
<div class="slide-container" style="position: relative; width: 1280px; height: 720px; overflow: hidden; background-color: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; box-sizing: border-box;">

    <div style="background-color: #1e293b; padding: 60px; border-radius: 20px; border: 1px dashed #475569; width: 800px; text-align: center;">
        
        <p style="font-family: 'Open Sans', sans-serif; font-size: 24px; color: #94a3b8; margin-bottom: 20px;">
            <span style="font-size: 40px; display: block; margin-bottom: 10px;">📋</span>

            <strong>(CTRL + V)</strong>
        </p>

        <button class="btn" onclick="event.stopPropagation(); window.location.href='10.html'">CONTINUE</button>

        <div style="margin-top: 30px; width: 100%; max-width: 500px; margin-left: auto; margin-right: auto; text-align: left;" onclick="event.stopPropagation();">

        </div>
    </div>

</div>
<script>
    document.addEventListener('keydown', function(event) {
        if (event.key === 'ArrowRight') { window.location.href='10.html'; }
        if (event.key === 'ArrowLeft') { window.location.href='8.html'; }
    });
</script>
